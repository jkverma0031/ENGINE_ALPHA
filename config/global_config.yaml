# ==============================================================================
# ENGINE_ALPHA - INSTITUTIONAL HFT CONTROL INTERFACE
# Configuration Environment: Offline Production / Supercomputing Cloud
# Description: Global parameter registry governing Feature Factories, Neural 
# Architectures, Distributional Reinforcement Learning, and Execution Safety.
# ==============================================================================

system:
  project_name: "ENGINE_ALPHA_INSTITUTIONAL"
  version: "3.0.0-HFT"
  random_seed: 42
  device: "cuda"                 # Default execution accelerator
  use_multithreading: true
  max_workers: 4                 # PyTorch DataLoader CPU background threads
  cudnn_benchmark: true          # Forces NVIDIA drivers to find optimal algorithms
  precision_mode: "mixed"        # AMP (Automatic Mixed Precision) activation

paths:
  # Base workspace definitions
  root_dir: "."
  database_path: "./database/wingo_history.db"
  log_dir: "./logs"
  
  # Data Pipeline locations
  raw_data_path: "./extras/WinGo30S_fetched_pages.csv"
  processed_data_path: "./datasets/WinGo30S_Ready_data.csv"
  
  # Model weight persistence layers (Artifact Vaults)
  scaler_artifact_dir: "./artifacts/scalers"
  supervised_artifact_dir: "./artifacts/supervised"
  unsupervised_artifact_dir: "./artifacts/unsupervised"
  reinforcement_artifact_dir: "./artifacts/reinforcement"
  meta_learner_artifact_dir: "./artifacts/meta_learner"

platform_settings:
  game_code: "30s"
  token: ""                      # Injected via secure environment variables
  base_url: "https://damangameworld.org"
  api_endpoint: "/api/wingo/get-issues"
  polling_interval_seconds: 3

# ==============================================================================
# DATA PIPELINE & QUANTITATIVE FEATURE ENGINEERING
# ==============================================================================
data_pipeline:
  preprocessing:
    game_filter_type: "30s"
    sort_chronologically: true
    drop_missing_sequences: false # Gaps handled via sequence masking
    gap_threshold_seconds: 35     # Delta threshold triggering discontinuity flag
    train_test_split_ratio: 0.80  # 80% Train, 20% Strict Out-Of-Sample
    cross_validation_folds: 5     # Purged Time-Series Walk-Forward folds
  
  feature_engineering:
    sequence_length: 60           # Core sliding window for LSTMs and Transformers
    rolling_horizons: [3, 5, 10, 20, 40] 
    time_unit: "ms"
    cyclical_time_base_hours: 24.0
    cyclical_time_base_minutes: 60.0
    cyclical_time_base_seconds: 60.0
    
    # Advanced PRNG Extraction Layers
    markov_chain_lookbacks: [1, 2, 3] # P(State | t-1), P(State | t-1, t-2), etc.
    fft_components: 3                 # Top N dominant frequencies to extract per window
    entropy_windows: [10, 20, 40]     # Windows for Shannon Entropy chaos detection

# ==============================================================================
# MODEL HYPERPARAMETER REGISTRY
# ==============================================================================
models:
  # ---------------------------------------------------------
  # Level-1 Tabular Ensemble (Optuna & SHAP Optimized)
  # ---------------------------------------------------------
  tabular_ensemble:
    use_optuna_tuning: true
    optuna_trials: 30
    optuna_timeout_seconds: 1200
    shap_pruning_fraction: 0.20   # Drops bottom 20% of noisy features automatically

  xgboost:
    n_estimators: 1200
    max_depth: 6
    learning_rate: 0.015
    subsample: 0.8
    colsample_bytree: 0.8
    tree_method: "hist" 
    eval_metric: "logloss"
    early_stopping_rounds: 50

  lightgbm:
    n_estimators: 1500
    max_depth: -1 
    num_leaves: 31
    learning_rate: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "binary"
    metric: "binary_logloss"
    boosting_type: "gbdt"

  # ---------------------------------------------------------
  # Level-1 Deep Sequence Architecture
  # ---------------------------------------------------------
  lstm:
    input_dim: null               # Injected dynamically
    hidden_dim: 256     
    num_layers: 3
    dropout: 0.3
    bidirectional: false
    learning_rate: 0.001 
    batch_size: 512       
    epochs: 150
    early_stopping_patience: 20
    # Advanced Loss & Optimization
    use_focal_loss: true          # Penalizes hard examples, ignores easy ones
    focal_gamma: 2.0
    focal_alpha: 0.25
    use_swa: true                 # Stochastic Weight Averaging
    swa_start_epoch: 100

  transformer:
    input_dim: null 
    seq_len: 60         
    d_model: 128        
    nhead: 8            
    num_layers: 4       
    dim_feedforward: 512
    dropout: 0.20
    learning_rate: 0.0003
    batch_size: 256      
    epochs: 150
    early_stopping_patience: 20
    use_focal_loss: true
    focal_gamma: 2.0
    focal_alpha: 0.25
    use_swa: true
    swa_start_epoch: 100

  # ---------------------------------------------------------
  # Unsupervised Anomaly Detection
  # ---------------------------------------------------------
  autoencoder:
    input_dim: null 
    bottleneck_dim: 16
    learning_rate: 0.001
    batch_size: 1024
    epochs: 50
    anomaly_threshold_quantile: 0.95 
    use_latent_gmm: true          # Uses Isolation Forest/GMM on latent space
    gmm_components: 3

  # ---------------------------------------------------------
  # Algorithmic Execution Agent (Distributional Rainbow RL)
  # ---------------------------------------------------------
  dqn:
    state_dim: 7 
    action_dim: 11                # 0% to 10% micro-staking tiers
    learning_rate: 0.00025
    gamma: 0.99   
    memory_capacity: 100000       # Doubled for stability
    target_update_frequency: 1000
    # Distributional RL Parameters (C51 / Quantile)
    distributional_rl: true
    num_atoms: 101                # TIGHTENED: 101 atoms for hyper-resolution of fractional rewards
    v_min: -2.0                   # TIGHTENED: Aligns exactly with normalized bankroll penalties
    v_max: 2.0                    # TIGHTENED: Aligns exactly with normalized bankroll payouts
    
# ==============================================================================
# LEVEL-2 NEURAL AGGREGATOR
# ==============================================================================
ensemble_meta_learner:
  stacking_method: "context_aware_attention" 
  learning_rate: 0.005
  epochs: 50
  validation_strategy: "purged_out_of_fold"
  confidence_threshold_override: 0.60 

# ==============================================================================
# RISK & BANKROLL MANAGEMENT
# ==============================================================================
inference_and_risk:
  live_loop_frequency_seconds: 30
  scraping_timeout_seconds: 5
  execution_safety_buffer_seconds: 3
  
  bankroll_management:
    initial_virtual_balance: 10000.0
    risk_free_rate: 0.0
    kelly_criterion_multiplier: 0.25 
    maximum_drawdown_hard_stop: 0.35 
    max_capital_per_bet_ratio: 0.10  

telemetry:
  track_model_drift: true
  rolling_drift_window: 1000       
  drift_alert_accuracy_drop: 0.04  
  save_predictions_to_db: true